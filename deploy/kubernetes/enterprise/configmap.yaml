apiVersion: v1
kind: ConfigMap
metadata:
  name: hashi-enterprise-config
  namespace: hashi-enterprise
  labels:
    app.kubernetes.io/name: hashi
    app.kubernetes.io/component: enterprise
data:
  HASHI_DEPLOYMENT_PROFILE: enterprise
  HASHI_BRIDGE_HOME: /data
  HASHI_WORKBENCH_PORT: "18800"
  HASHI_ORGANIZATION_ID: ORG-001
  HASHI_ENTERPRISE_SCHEDULER_LEASE_ENABLED: "false"
  HASHI_ENTERPRISE_SCHEDULER_LEASE_BACKEND: db
  HASHI_ENTERPRISE_SCHEDULER_LEASE_NAME: superloop-scheduler
  HASHI_ENTERPRISE_SCHEDULER_LEASE_TTL_SECONDS: "60"
  HASHI_ENTERPRISE_SCHEDULER_LEASE_K8S_NAMESPACE: hashi-enterprise
  HASHI_ENTERPRISE_SCHEDULER_LEASE_K8S_IN_CLUSTER: "true"
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_ENABLED: "false"
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_MIN_SIZE: "1"
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_MAX_SIZE: "4"
  HASHI_AUDIT_EXPORT_FORMAT: siem
  HASHI_AUDIT_EXPORT_BATCH_SIZE: "100"
  HASHI_AUDIT_EXPORT_TIMEOUT: "10"
  HASHI_AUDIT_EXPORT_MAX_ATTEMPTS: "3"
  HASHI_AUDIT_EXPORT_BACKOFF: "1"
  HASHI_AUDIT_EXPORT_DAEMON_INTERVAL: "60"
