apiVersion: v1
kind: Secret
metadata:
  name: hashi-enterprise-secrets
  namespace: hashi-enterprise
  labels:
    app.kubernetes.io/name: hashi
    app.kubernetes.io/component: enterprise
type: Opaque
stringData:
  # Example only. Replace before production use.
  HASHI_WORKBENCH_ADMIN_TOKEN: change-me
  # Keep SQLite for a single-pod baseline. Use an external PostgreSQL secret for
  # multi-replica staging.
  HASHI_ENTERPRISE_DATABASE_URL: sqlite:////data/state/enterprise.sqlite
  # Mounted connector secrets can be referenced by HASHI secret providers.
  # Example: file:///var/run/secrets/hashi/connectors/slack-webhook-url
  slack-webhook-url: replace-me
  google-chat-webhook-url: replace-me
  HASHI_AUDIT_EXPORT_ENDPOINT: https://siem.example.com/ingest
  HASHI_AUDIT_EXPORT_HEADER: "Authorization: Bearer replace-me"
