# Production hardening example. Replace host names, TLS Secret names, namespace
# selectors, and sizing values for your cluster before use.

replicaCount: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: hashi-enterprise.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: hashi-enterprise-tls
      hosts:
        - hashi-enterprise.example.com

networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx
  egress:
    allowDns: true
    allowAll: false

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
