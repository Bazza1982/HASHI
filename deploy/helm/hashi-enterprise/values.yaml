replicaCount: 1

image:
  repository: ghcr.io/example/hashi-enterprise
  tag: replace-me
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 18800

enterprise:
  deploymentProfile: enterprise
  instanceId: HASHI-ENTERPRISE-001
  organizationId: ORG-001
  bridgeHome: /data
  workbenchPort: "18800"

schedulerLease:
  enabled: false
  name: superloop-scheduler
  holder: "$(HASHI_POD_NAME)"
  ttl: "60"
  pool:
    enabled: false
    minSize: "1"
    maxSize: "4"

secrets:
  adminToken: change-me
  databaseUrl: sqlite:////data/state/enterprise.sqlite
  connectorSecretName: hashi-enterprise-secrets

externalDatabase:
  enabled: false
  secretName: hashi-enterprise-database
  secretKey: HASHI_ENTERPRISE_DATABASE_URL

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 20Gi
  accessModes:
    - ReadWriteOnce

connectorSecrets:
  mountPath: /var/run/secrets/hashi/connectors
  readOnly: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hashi-enterprise.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false
  ingressNamespaceSelector: {}
  egress:
    allowDns: true
    allowAll: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: /api/health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

auditExport:
  enabled: false
  schedule: "*/5 * * * *"
  format: siem
  endpoint: https://siem.example.com/ingest
  header: "Authorization: Bearer change-me"
  endpointSecretRef:
    name: ""
    key: HASHI_AUDIT_EXPORT_ENDPOINT
  headerSecretRef:
    name: ""
    key: HASHI_AUDIT_EXPORT_HEADER
  batchSize: "100"
  timeout: "10"
  maxAttempts: "3"
  backoff: "1"
  checkpoint: /data/state/audit_live_export_checkpoint.json
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  daemon:
    enabled: false
    interval: "60"
    replicaCount: 1
    dbLease:
      enabled: false
      name: audit-export
      holder: "$(HASHI_POD_NAME)"
      ttl: "180"

nodeSelector: {}
tolerations: []
affinity: {}
