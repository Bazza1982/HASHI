apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hashi-enterprise.fullname" . }}
  labels:
    {{- include "hashi-enterprise.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hashi-enterprise.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "hashi-enterprise.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: enterprise
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "hashi-enterprise.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hashi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: workbench
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "hashi-enterprise.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.connectorSecretName }}
          {{- if .Values.externalDatabase.enabled }}
          env:
            - name: HASHI_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HASHI_ENTERPRISE_SCHEDULER_LEASE_HOLDER
              value: {{ .Values.schedulerLease.holder | quote }}
            - name: HASHI_ENTERPRISE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.secretName }}
                  key: {{ .Values.externalDatabase.secretKey }}
          {{- else }}
          env:
            - name: HASHI_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HASHI_ENTERPRISE_SCHEDULER_LEASE_HOLDER
              value: {{ .Values.schedulerLease.holder | quote }}
          {{- end }}
          volumeMounts:
            - name: hashi-data
              mountPath: {{ .Values.enterprise.bridgeHome }}
            - name: hashi-secrets
              mountPath: {{ .Values.connectorSecrets.mountPath }}
              readOnly: {{ .Values.connectorSecrets.readOnly }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: workbench
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: workbench
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: hashi-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "hashi-enterprise.fullname" .)) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: hashi-secrets
          secret:
            secretName: {{ .Values.secrets.connectorSecretName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
