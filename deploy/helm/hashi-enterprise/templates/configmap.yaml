apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hashi-enterprise.fullname" . }}-config
  labels:
    {{- include "hashi-enterprise.labels" . | nindent 4 }}
data:
  HASHI_DEPLOYMENT_PROFILE: {{ .Values.enterprise.deploymentProfile | quote }}
  HASHI_INSTANCE_ID: {{ .Values.enterprise.instanceId | quote }}
  HASHI_ORGANIZATION_ID: {{ .Values.enterprise.organizationId | quote }}
  HASHI_ENTERPRISE_BOOTSTRAP_COMPLETE: {{ .Values.enterprise.bootstrapComplete | quote }}
  HASHI_BRIDGE_HOME: {{ .Values.enterprise.bridgeHome | quote }}
  HASHI_WORKBENCH_PORT: {{ .Values.enterprise.workbenchPort | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_ENABLED: {{ .Values.schedulerLease.enabled | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_BACKEND: {{ .Values.schedulerLease.backend | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_NAME: {{ .Values.schedulerLease.name | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_TTL_SECONDS: {{ .Values.schedulerLease.ttl | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_K8S_NAMESPACE: {{ .Values.schedulerLease.kubernetes.namespace | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_K8S_IN_CLUSTER: {{ .Values.schedulerLease.kubernetes.inCluster | quote }}
  {{- if .Values.schedulerLease.kubernetes.kubeconfigPath }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_KUBECONFIG: {{ .Values.schedulerLease.kubernetes.kubeconfigPath | quote }}
  {{- end }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_ENABLED: {{ .Values.schedulerLease.pool.enabled | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_MIN_SIZE: {{ .Values.schedulerLease.pool.minSize | quote }}
  HASHI_ENTERPRISE_SCHEDULER_LEASE_POOL_MAX_SIZE: {{ .Values.schedulerLease.pool.maxSize | quote }}
