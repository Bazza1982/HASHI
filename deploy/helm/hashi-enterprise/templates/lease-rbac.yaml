{{- if .Values.leaderElection.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hashi-enterprise.fullname" . }}-lease
  labels:
    {{- include "hashi-enterprise.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hashi-enterprise.fullname" . }}-lease
  labels:
    {{- include "hashi-enterprise.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hashi-enterprise.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hashi-enterprise.fullname" . }}-lease
{{- end }}
