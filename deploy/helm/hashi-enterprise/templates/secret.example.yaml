apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.connectorSecretName }}
  labels:
    {{- include "hashi-enterprise.labels" . | nindent 4 }}
  annotations:
    hashi.ai/example: "true"
type: Opaque
stringData:
  HASHI_WORKBENCH_ADMIN_TOKEN: {{ .Values.secrets.adminToken | quote }}
  HASHI_ENTERPRISE_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  README: "Example only. Replace this secret with values from your enterprise secret manager."
