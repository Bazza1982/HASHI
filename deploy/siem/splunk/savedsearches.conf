[HASHI Audit - Policy Deny Spike]
description = Detect a burst of denied or blocked policy decisions.
search = index=hashi sourcetype=_json source=hashi.enterprise.audit (hashi_event_type=policy OR event.event.category{}=configuration) (hashi_status=denied OR hashi_status=blocked OR event.event.outcome=failure) | stats count as deny_count values(hashi_action) as actions by hashi_org_id, event.organization.id, event.user.id | where deny_count >= 10
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
disabled = 1

[HASHI Audit - High Risk Egress Approval Required]
description = Detect connector or channel egress that requires approval.
search = index=hashi sourcetype=_json source=hashi.enterprise.audit (hashi_event_type=connector OR hashi_event_type=channel OR event.event.category{}=api OR event.event.category{}=network) (hashi_status=approval_required OR event.labels.hashi.audit.status=approval_required) | stats count as approval_count values(hashi_action) as actions by hashi_org_id, event.organization.id, event.user.id
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
disabled = 1

[HASHI Audit - Chain Index Gap]
description = Detect missing chain indexes in ingested audit events. Validate in staging before enabling for sharded indices.
search = index=hashi sourcetype=_json source=hashi.enterprise.audit hashi_chain_index=* | sort 0 hashi_org_id hashi_chain_index | streamstats current=f last(hashi_chain_index) as previous_chain_index by hashi_org_id | eval expected_chain_index=previous_chain_index+1 | where isnotnull(previous_chain_index) AND hashi_chain_index!=expected_chain_index | table _time hashi_org_id previous_chain_index expected_chain_index hashi_chain_index hashi_audit_id hashi_event_hash
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
disabled = 1

[HASHI Audit - Exporter Stale]
description = Detect no HASHI audit events ingested for the expected exporter window.
search = index=hashi sourcetype=_json source=hashi.enterprise.audit earliest=-15m | stats count as event_count latest(_time) as last_seen | where event_count=0
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
disabled = 1

