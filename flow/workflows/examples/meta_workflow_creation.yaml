# HASHI Flow — Meta-Workflow
# "工作流创建工作流"
# 这是整个系统最核心的工作流：用来动态创建任何新的工作流
# 版本: 1.6.0

workflow:
  id: meta-workflow-creation
  name: "工作流创建工作流"
  version: "1.6.0"
  description: |
    接收用户的自然语言需求，自动设计并创建完整的工作流配置。
    这是 HASHI Flow 的元工作流，用于 bootstrap 任何其他工作流。
    v1.6：集成 smart-preflight-module（智能预检 + 问题质量过滤 + 超时自动默认值）
  tags: [meta, system, workflow-creation]

meta:
  created_by: human
  created_at: "2026-03-26T06:00:00Z"
  previous_version: "1.4.0"
  improvement_count: 0
  source_prompt: "系统核心工作流，手动创建"
  # trace_id 和 parent_run_id 由 flow_runner 在运行时自动生成并写入 events

changelog:
  - version: "1.0.0"
    date: "2026-03-26"
    changes: "初始版本：analyze → design → create_files → validate"
  - version: "1.2.0"
    date: "2026-03-26"
    changes: "新增 evaluate/apply_improvement/human_approval/publish 步骤"
  - version: "1.3.0"
    date: "2026-03-26"
    changes: |
      修复 13 个审查问题：
      - 删除 human_approval 阻塞步骤，改为异步 HChat 通知
      - 删除 quality_requirement 冗余问题
      - Orchestrator 改为 flow-runner（akane 是 Human Interface Agent）
      - 所有 prompt 改为质量优先（默认 Opus，简单任务降级 Sonnet）
      - publish 改为 candidate 机制（不直接覆盖自身）
      - 删除 self_improvement_score（Evaluator 不给自己打分）
      - success_criteria 改用 evaluation_kb 历史查询
      - Designer/Validator 参照实际 schema 文件
  - version: "1.4.0"
    date: "2026-03-27"
    changes: |
      事件驱动 + 人工控制：
      - HChat 实时通知（替代轮询 watchdog）
      - 信号文件暂停/停止机制
      - wait_for_human 机制（analyst 可暂停问人）
      - 30 秒步间缓冲
  - version: "1.5.0"
    date: "2026-03-27"
    changes: |
      多厂商独立评估 + 设计批判：
      - evaluator_01 改用 codex-cli / GPT-5.4（消除 Claude 自评偏差）
      - 新增 reviewer_01（codex-cli / GPT-5.4）独立审查员
      - 新增 critic_01（codex-cli / GPT-5.4）Devil's Advocate 角色
      - 新增 critique_design 步骤（design → critic → create_files）
      - critic 权重机制：意见仅供参考，orchestrator 有最终决策权
  - version: "1.6.0"
    date: "2026-03-27"
    changes: |
      集成 smart-preflight-module：
      - 以 smart-preflight 4步骤流水线替换单步 analyze_requirements
      - 新增 questioner_01（Opus）+ integrator_01（Sonnet）workers
      - 三维问题质量评分（necessity×0.5 + impact×0.3 + clarity×0.2），阈值0.6过滤，最多5个问题
      - wait_for_human_timeout_seconds: 300（依赖 NAGARE-TIMEOUT-001）
      - smart defaults 自动填充：超时后继续执行而非卡死
      - preflight_context.json 通过 from_artifacts 传递给后续设计步骤

# =============================================================================
# Pre-flight：在设计工作流之前，收集必要信息
# =============================================================================

pre_flight:
  analyst_agent: analyst_01
  auto_scan: false  # 元工作流不扫描文件，直接问用户

  collect_from_human:
    - key: task_description
      question: "请详细描述你想要完成的任务是什么？"
      required: true
      type: text

    - key: source_files
      question: "有需要处理的输入文件吗？如有，请提供路径。"
      required: false
      type: text

  # 以下为系统默认值，不向用户提问
  defaults:
    quality_requirement: "高质量（质量优先）"
    max_interventions: 0  # pre-flight 后完全自动

# =============================================================================
# Agent 定义
# =============================================================================

agents:
  orchestrator:
    id: flow-runner  # flow_runner 引擎本身作为 orchestrator
    human_interface: akane  # akane 负责用户沟通

  workers:
    - id: analyst_01
      role: "需求分析师"
      agent_md: "flow/agents/analyst/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/analyst_01"
      backend: claude-cli
      model: claude-opus-4-6  # 需求分析需要深度理解
      controllable_by: [orchestrator, human]

    - id: designer_01
      role: "工作流设计师"
      agent_md: "flow/agents/designer/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/designer_01"
      backend: claude-cli
      model: claude-opus-4-6  # 设计任务需要最高质量
      controllable_by: [orchestrator, human]

    - id: validator_01
      role: "工作流验证员"
      agent_md: "flow/agents/validator/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/validator_01"
      backend: claude-cli
      model: claude-sonnet-4-6  # 格式检查 Sonnet 足够
      controllable_by: [orchestrator, human]

    - id: evaluator_01
      role: "评估与改进引擎"
      agent_md: "flow/agents/evaluator/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/evaluator_01"
      backend: codex-cli
      model: gpt-5.4  # 独立评估：使用不同厂商模型消除自评偏差
      controllable_by: [orchestrator, human]

    - id: reviewer_01
      role: "独立审查员"
      agent_md: "flow/agents/reviewer/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/reviewer_01"
      backend: codex-cli
      model: gpt-5.4  # 独立审查：使用不同厂商模型确保评估独立性
      controllable_by: [orchestrator, human]

    - id: critic_01
      role: "魔鬼代言人（Devil's Advocate）"
      agent_md: "flow/agents/critic/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/critic_01"
      backend: codex-cli
      model: gpt-5.4  # 外部视角：专门挑战设计假设和盲点
      controllable_by: [orchestrator, human]

    - id: questioner_01
      role: "问题生成与过滤专家（smart-preflight）"
      agent_md: "flow/workflows/library/smart-preflight-module/workers/questioner_01/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/questioner_01"
      backend: claude-cli
      model: claude-opus-4-6  # 问题质量评分需要高判断力
      controllable_by: [orchestrator, human]

    - id: integrator_01
      role: "响应集成与默认值解析（smart-preflight）"
      agent_md: "flow/workflows/library/smart-preflight-module/workers/integrator_01/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/integrator_01"
      backend: claude-cli
      model: claude-sonnet-4-6  # 合并回答 Sonnet 足够
      controllable_by: [orchestrator, human]

    - id: debug_01
      role: "调试代理"
      agent_md: "flow/agents/debug/AGENT.md"
      workspace: "flow/runs/{run_id}/workers/debug_01"
      backend: claude-cli
      model: claude-sonnet-4-6  # 调试用 Sonnet 足够
      controllable_by: [orchestrator]

# =============================================================================
# 执行步骤（pre-flight 后完全自动，无人工阻塞点）
# =============================================================================

steps:
  # ─── Smart Preflight（步骤 1-4）：集成 smart-preflight-module 流水线 ──────────
  # 替代旧版单步 analyze_requirements + wait_for_human
  # 亮点：三维问题质量评分（necessity×0.5 + impact×0.3 + clarity×0.2），
  # 阈值0.6过滤，最多5个问题；超时300秒自动使用 smart defaults 继续

  # 步骤 1：深度分析任务需求与信息缺口
  - id: analyze_requirements
    name: "深度分析任务需求与信息缺口"
    agent: analyst_01
    depends: []
    input:
      params:
        task_description: "{pre_flight.task_description}"
        source_files: "{pre_flight.source_files}"
    prompt: |
      深度分析以下任务需求，识别信息缺口，输出 task_analysis.json。

      任务描述：{pre_flight.task_description}
      输入文件：{pre_flight.source_files}

      请输出（严格 JSON）：
      {
        "task_type": "translation/research/writing/analysis/other",
        "task_summary": "一句话总结任务",
        "complexity": "low/medium/high",
        "suggested_steps": [...],        // 3-6步
        "suggested_agents": [...],       // 2-5个 agent 角色
        "model_recommendations": {...},  // step_id → model
        "estimated_duration_minutes": 0,
        "estimated_cost_usd_range": [0, 0],
        "risk_points": [...],
        "information_gaps": [            // 系统无法自主推断的信息缺口（供 questioner 使用）
          {
            "key": "snake_case_key",
            "description": "缺少什么信息",
            "impact_if_unknown": "不知道这个信息会导致什么问题",
            "parameter_layer": "design_time OR runtime OR implementation_detail",
            "can_assume": true/false,    // 是否可以合理假设
            "suggested_default": "建议的默认值（如果 can_assume=true）"
          }
        ]
        // parameter_layer 字段是必填的，定义如下：
        // - design_time: 影响工作流架构/步骤数量/agent选择的参数，设计时必须确认，必须问设计者（即当前用户）
        // - runtime: 工作流运行时由该工作流自身的 pre-flight 向终端用户收集的输入，
        //            设计时只需确保 workflow 的 pre-flight 包含收集机制，不需要知道具体值
        //            例如：用户要写哪段落、提供什么源材料 —— 这些是 runtime，设计时绝对不问
        // - implementation_detail: 技术参数，有合理默认值，设计者无需关心
      }
    output:
      artifacts:
        - key: task_analysis
          path: task_analysis.json
          type: json
    timeout_seconds: 360

  # 步骤 2：动态生成问题并质量过滤（smart-preflight 核心）
  - id: generate_preflight_questions
    name: "智能问题生成与质量过滤"
    agent: questioner_01
    depends: [analyze_requirements]
    wait_for_human: true                    # 过滤后有问题则暂停等待 human 回答
    wait_for_human_timeout_seconds: 300     # NAGARE-TIMEOUT-001: 300s 后自动使用 smart defaults
    input:
      from_artifacts: [task_analysis]
      params:
        task_description: "{pre_flight.task_description}"
    prompt: |
      读取 task_analysis.json 中的 information_gaps，对每个缺口进行三维质量评分。

      ⚠️ 重要：你的受众是工作流设计者（当前用户），不是工作流的最终用户。
      - parameter_layer == "runtime" 的缺口：直接跳过，加入 auto_resolved（value="runtime_parameter"）
        因为这些是被设计的工作流在运行时向终端用户收集的，设计时不需要问
      - parameter_layer == "implementation_detail" 的缺口：直接使用 suggested_default，加入 auto_resolved
      - 只有 parameter_layer == "design_time" 的缺口才进入评分流程

      质量评分公式（仅对 design_time 缺口）：score = necessity×0.5 + impact×0.3 + clarity×0.2
      - necessity (0-1)：问这个问题是否必要
      - impact (0-1)：答案对设计质量的影响程度
      - clarity (0-1)：问题表达是否清晰

      过滤规则（仅对通过 parameter_layer 过滤的缺口）：
      - score < 0.6 → 删除（低价值问题）
      - can_assume=true + score < 0.75 → 直接使用 suggested_default，不提问
      - 最终问题数 ≤ 5（若超过则取 score 最高的5个）

      输出 question_set.json（同时也是 clarification_questions 格式，供 wait_for_human 机制读取）：
      {
        "clarification_questions": ["最终问题文本列表"],
        "questions_detail": [
          {
            "key": "snake_case_key",
            "question": "问题文本",
            "score": 0.0,
            "default": "smart default 值"
          }
        ],
        "auto_resolved": [               // 已自动解析（不需要问 human）的字段
          {"key": "...", "value": "runtime_parameter", "reason": "parameter_layer=runtime，运行时由 workflow 自身收集，设计时跳过"},
          {"key": "...", "value": "...", "reason": "can_assume=true + score<0.75"}
        ]
      }

      同时将 smart defaults 写入 _human_defaults.json（供超时恢复使用，仅含 can_assume=true 的字段）：
      {
        "key1": "default_value1",
        "key2": "default_value2"
      }
    output:
      artifacts:
        - key: question_set
          path: question_set.json
          type: json
    timeout_seconds: 300

  # 步骤 3：集成 human 响应与 smart defaults
  - id: integrate_preflight_responses
    name: "集成人类响应与智能默认值"
    agent: integrator_01
    depends: [generate_preflight_questions]
    input:
      from_artifacts: [task_analysis, question_set]
      params:
        task_description: "{pre_flight.task_description}"
    prompt: |
      读取以下内容，生成完整的 preflight_context.json：

      1. task_analysis.json — 任务分析结果
      2. question_set.json — 已过滤的问题集 + auto_resolved 字段
      3. _human_response.json（如存在）— human 的回答
         - 若含 _timeout_assumed=true，表示已超时，使用 defaults

      合并规则：
      - human 明确回答 → 使用 human 回答
      - human 未回答 + 存在 default → 使用 default，标记 assumed=true
      - human 未回答 + 无 default + can_assume=false → 标记为 blocking_issue
      - auto_resolved 字段直接采纳

      输出 preflight_context.json：
      {
        "resolved": {
          "key1": {"value": "...", "source": "human/default/auto", "assumed": false}
        },
        "blocking_issues": [],           // 必须为空才能继续
        "assumption_count": 0,
        "human_input_ratio": 0.0,        // human 实际回答的比例
        "ready_for_workflow": true
      }
    output:
      artifacts:
        - key: preflight_context
          path: preflight_context.json
          type: json
    timeout_seconds: 300

  # 步骤 4：验证 preflight 上下文完整性
  - id: validate_preflight
    name: "验证预检上下文完整性"
    agent: analyst_01
    depends: [integrate_preflight_responses]
    input:
      from_artifacts: [preflight_context]
    prompt: |
      读取 preflight_context.json，验证：
      1. ready_for_workflow == true
      2. blocking_issues 为空列表
      3. resolved 中所有必要字段存在

      如果验证通过，直接输出：
      {"status": "completed", "valid": true, "summary": "预检通过，ready_for_workflow=true"}

      如果验证失败，输出：
      {"status": "failed", "valid": false, "blocking_issues": [...], "summary": "预检失败原因"}
    output:
      artifacts:
        - key: preflight_validation
          path: preflight_validation.json
          type: json
    quality_gate:
      type: auto
      criteria:
        - "preflight_validation.valid == true"
    timeout_seconds: 180

  # ─── 工作流设计阶段（步骤 5-8）────────────────────────────────────────────────

  # 步骤 5：设计工作流（参照知识库 + schema）
  - id: design_workflow
    name: "设计工作流 YAML"
    agent: designer_01
    depends: [validate_preflight]
    input:
      from_artifacts: [task_analysis, preflight_context]
      params:
        task_description: "{pre_flight.task_description}"
        knowledge_base_path: "flow/evaluation_kb/"
        workflow_schema_path: "flow/workflows/schema/workflow_schema.yaml"
    prompt: |
      基于以下分析结果，设计完整的工作流配置：

      任务需求：{pre_flight.task_description}
      任务分析：[见 task_analysis.json]

      ⚠️ 设计前必读：
      - 参阅 flow/workflows/schema/workflow_schema.yaml，确保 YAML 严格符合 schema
      - 参阅 flow/evaluation_kb/patterns/common_failures.yaml，避免历史已知失败模式
      - 参阅 flow/evaluation_kb/patterns/model_performance.yaml，选择合适 model
      - 参阅 flow/evaluation_kb/improvements/applied.yaml，采纳已验证的改进做法
      - 检查 flow/evaluation_kb/improvements/pending.yaml，如有用户已批准的改进，纳入设计

      请生成 design_package.json，内容包含：
      1. `workflow_yaml`：完整的 workflow YAML 字符串（严格符合 schema）
      2. `design_rationale`：设计决策记录（每个关键选择的原因，可审计）
      3. `workers`：worker 列表，每个包含 id、agent_md_content（100字以内）、model
      4. `dag_diagram`：ASCII 格式的 DAG
      5. `summary`：步骤数、worker 数、预计耗时（分钟）、预计成本（美元）
      6. `kb_references`：本设计参考了哪些知识库条目（traceability）

      设计原则：
      - 质量优先：默认使用 Opus，仅简单的格式化/校对任务降级到 Sonnet
      - 步骤控制在 3-6 个（简洁为主）
      - pre-flight 后完全自动（max_interventions = 0）
      - 错误处理：debug_agent: debug_01, max_attempts: 3

      最后输出结果 JSON：
      ```json
      {"status": "completed", "artifacts_produced": {"design_package": "design_package.json"}, "summary": "设计完成"}
      ```
    output:
      artifacts:
        - key: design_package
          path: design_package.json
          type: json
    timeout_seconds: 600

  # 步骤 2.5：设计批判（Devil's Advocate）
  # ⚠️ 权重机制：critic 的意见是参考性质，不是指令。
  # orchestrator 有最终决策权——评估 critic 意见是否合理后选择性采纳。
  # 即使 critic 全盘否定设计，orchestrator 也可以记录意见但继续推进。
  # 目标：引入外部视角，而非造成工作流阻塞或设计大幅逆转。
  - id: critique_design
    name: "设计批判（Devil's Advocate）"
    agent: critic_01
    depends: [design_workflow]
    input:
      from_artifacts: [task_analysis, design_package]
      params:
        task_description: "{pre_flight.task_description}"
    prompt: |
      你是 Devil's Advocate（魔鬼代言人）。你的职责是从对立面审视设计，挑出潜在的问题。

      读取以下 artifacts：
      - task_analysis.json（需求分析结果）
      - design_package.json（设计方案及其 rationale）

      请从以下五个维度进行批判，输出 critique_report.json：

      1. **盲点**：设计是否遗漏了任务需求中的重要场景或边缘情况？
      2. **风险**：设计中哪些决策可能在执行时导致失败？（例如：model 选择不当、timeout 太短、步骤依赖缺失）
      3. **过度复杂**：是否有不必要的步骤、agent、或配置？能否简化？
      4. **不必要假设**：设计是否做了任务描述中未提及的假设？这些假设是否安全？
      5. **替代方案**：是否有更简单、更可靠的设计方式被忽略？

      输出格式：
      ```json
      {
        "status": "completed",
        "critique": {
          "blind_spots": [{"issue": "...", "severity": "high/medium/low", "suggestion": "..."}],
          "risks": [{"issue": "...", "severity": "high/medium/low", "mitigation": "..."}],
          "over_engineering": [{"issue": "...", "suggestion": "..."}],
          "unwarranted_assumptions": [{"assumption": "...", "risk_if_wrong": "..."}],
          "alternative_approaches": [{"approach": "...", "pros": "...", "cons": "..."}]
        },
        "overall_assessment": "设计整体是否合理的一句话总结",
        "critical_issues_count": 0,
        "recommendation": "proceed / revise_minor / revise_major",
        "summary": "批判总结",
        "artifacts_produced": {"critique_report": "critique_report.json"}
      }
      ```

      ⚠️ 重要原则：
      - 你的意见是**参考性质**，供 orchestrator 决策使用，不是强制要求
      - 请保持建设性批判——指出问题的同时提供具体改进建议
      - severity 要诚实标注，不要为了显示价值而夸大问题
      - 如果设计确实优秀，也可以给出 "proceed" 建议，不必强行找问题
    output:
      artifacts:
        - key: critique_report
          path: critique_report.json
          type: json
    timeout_seconds: 600

  # 步骤 3：创建工作流文件（参考 critic 意见但 orchestrator 决定是否采纳）
  - id: create_workflow_files
    name: "创建工作流文件"
    agent: designer_01
    depends: [critique_design]
    input:
      from_artifacts: [design_package, critique_report]
    prompt: |
      根据 design_package.json 的内容，实际创建以下文件：

      1. 新工作流的 workflow.yaml（保存到 flow/workflows/library/）
      2. 所有 worker 的目录和 AGENT.md
      3. 各 worker 的初始 config.json
      4. 工作空间目录结构

      ⚠️ 在创建文件之前，必须先逐条处理 critique_report.json（Devil's Advocate 的批判意见）。

      【强制要求】对 critique_report 中所有 severity=high 的 blind_spots 和 risks，
      你必须逐条给出明确回应，格式如下：
      - "同意" + 采纳措施（说明如何在文件中修正）
      - "拒绝" + 理由（说明为什么 critic 的意见不适用）
      - "延期" + 理由（说明为什么现在不处理，记录为 pending）

      对 severity=medium/low 的意见可以批量处理，但也需要简要说明处理决策。
      你有最终决策权，但必须留下可审计的决策记录。

      在 creation_report.json 中包含 "critic_responses" 字段，结构如下：
      {
        "critic_responses": [
          {"issue": "原始问题", "severity": "high", "decision": "同意/拒绝/延期", "rationale": "理由", "action_taken": "具体措施"}
        ],
        "files_created": [...],
        "checksums": {...}
      }

      完成后输出 creation_report.json。
    output:
      artifacts:
        - key: creation_report
          path: creation_report.json
          type: json
    timeout_seconds: 600

  # 步骤 4：双层验证
  - id: validate_workflow
    name: "验证工作流可执行性"
    agent: validator_01
    depends: [create_workflow_files]
    input:
      from_artifacts: [design_package, creation_report]
      params:
        schema_path: "flow/workflows/schema/workflow_schema.yaml"
    prompt: |
      对生成的工作流进行双层验证：

      **第一层（格式验证）**：
      1. workflow.yaml 语法正确，严格符合 flow/workflows/schema/workflow_schema.yaml
      2. 所有步骤的依赖关系无循环（用拓扑排序验证）
      3. 所有引用的 agent_id 都有对应的 worker 定义
      4. 所有 AGENT.md 都存在且内容完整
      5. 所有 timeout 值合理（步骤类型 × 内容规模 × model 速度）

      **第二层（设计合理性验证）**：
      6. pre_flight 只问系统无法自主推断的问题（无冗余提问）
      7. 步骤划分符合单一职责原则
      8. model 选择与任务复杂度匹配
      9. success_criteria 可被客观验证
      10. 预估成本在合理范围内

      输出 validation_report.json：
      {
        "valid": true/false,
        "layer1_issues": [...],
        "layer2_issues": [...],
        "warnings": [...],
        "design_quality_score": 0-10,
        "recommendation": "可以执行" / "建议修改后执行"
      }
    output:
      artifacts:
        - key: validation_report
          path: validation_report.json
          type: json
    quality_gate:
      type: auto
      criteria:
        - "validation_report.valid == true"
    timeout_seconds: 360

  # 步骤 5：独立代码审查（GPT 独立审查 validator 的结论）
  - id: independent_review
    name: "独立审查验证结果"
    agent: reviewer_01
    depends: [validate_workflow]
    input:
      from_artifacts: [design_package, creation_report, validation_report]
    prompt: |
      你是一个独立审查员（与 designer 和 validator 完全隔离）。
      阅读以下 artifacts：
      - design_package.json（设计决策）
      - creation_report.json（创建结果）
      - validation_report.json（验证结论）

      重点审查：
      1. validator 的结论是否可信？有无遗漏的重大问题？
      2. designer 对 critic 高危问题的处理是否合理？被拒绝的建议是否有充分理由？
      3. 从"独立第三方"视角看，这个工作流有无明显盲点或风险？

      输出 review_report.json：
      {
        "reviewer_agrees_with_validation": true/false,
        "disagreements": [...],
        "additional_issues": [...],
        "overall_verdict": "approve" / "flag_for_attention" / "reject",
        "verdict_reasoning": "..."
      }

      如果你同意 validator 的结论且没有额外问题，直接输出 overall_verdict=approve。
      不要重复 validator 已经发现的问题，只报告新发现。
    output:
      artifacts:
        - key: review_report
          path: review_report.json
          type: json
    timeout_seconds: 360

  # 步骤 6：评估 + 生成改进建议
  - id: evaluate_and_improve
    name: "评估设计质量并生成改进建议"
    agent: evaluator_01
    depends: [independent_review]
    input:
      from_artifacts: [task_analysis, design_package, validation_report, review_report]
      params:
        kb_path: "flow/evaluation_kb/"
    prompt: |
      综合评估本次工作流设计的质量，并生成可落地的改进建议。

      读取以下 artifacts：
      - task_analysis.json（需求分析结果）
      - design_package.json（设计决策及 rationale）
      - validation_report.json（双层验证结果）

      同时参阅：
      - flow/evaluation_kb/workflow_scores/scores.jsonl（历史评分）
      - flow/evaluation_kb/improvements/pending.yaml（上次建议的采纳情况）
      - flow/evaluation_kb/improvements/applied.yaml（已验证的改进）

      计算 improvement_adoption_rate：上次 pending.yaml 中有多少条已被 designer 采纳
      （对比 pending.yaml 和 design_package.kb_references）
      注意：applied.yaml 中 status 为 completed_noop_already_satisfied 的条目
      不计入 adoption_rate 分子，因为它们不代表 designer 主动采纳，而是原本已满足。
      adoption_rate = (真正修改了 YAML 的 A 类条目数) / (上次 pending 总数)

      输出 evaluation_report.json：
      {
        "workflow_id": "...",
        "run_id": "...",
        "timestamp": "...",
        "metrics": {
          "design_quality_score": 0-10,
          "validation_score": 0-10,
          "estimated_cost_usd": ...,
          "improvement_adoption_rate": 0.0-1.0
        },
        "patterns_detected": [...],
        "improvements": [
          {
            "id": "imp-{run_id}-001",
            "class": "A/B/C",
            "target": "...",
            "description": "...",
            "evidence": "...",
            "confidence": 0.0-1.0,
            "expected_benefit": "..."
          }
        ],
        "knowledge_updates": [...]
      }

      改进分级标准：
      - A 类（自动应用）：低风险，仅修改 prompt 文字或 timeout 值
      - B 类（需用户批准）：修改步骤结构或 agent 角色
      - C 类（需用户批准）：修改核心设计逻辑或引入新 agent
    output:
      artifacts:
        - key: evaluation_report
          path: evaluation_report.json
          type: json
    timeout_seconds: 600

  # 步骤 6：生成 vNext candidate（自动应用 A 类，B/C 类记录 pending）
  - id: apply_improvement
    name: "生成 vNext candidate 工作流"
    agent: evaluator_01
    depends: [evaluate_and_improve]
    input:
      from_artifacts: [design_package, evaluation_report]
      params:
        kb_improvements_path: "flow/evaluation_kb/improvements/"
        version_history_dir: "flow/evaluation_kb/workflow_versions/"
    prompt: |
      基于 evaluation_report.json 中的改进建议，生成下一版本的 candidate 工作流。

      步骤：
      1. 读取 design_package.json 中的 workflow_yaml（当前版本）
      2. 自动应用所有 class=A 的改进建议（低风险，无需确认）
      3. 确定新版本号（semantic versioning）：
         - 只有 A 类改进 → patch（x.y.z → x.y.z+1）
         - 有 B/C 类建议（记录但不应用） → 版本号不变，仅标注 pending
      4. 生成 unified diff（当前版本 vs vNext）
      5. 将 A 类改进记录写入 flow/evaluation_kb/improvements/applied.yaml
      6. 将 B/C 类改进写入 flow/evaluation_kb/improvements/pending.yaml（异步等待批准）
      7. 备份当前版本到 flow/evaluation_kb/workflow_versions/{workflow_id}/v{current}.yaml

      输出 improvement_package.json：
      {
        "current_version": "...",
        "next_version": "...",
        "a_class_applied": [...],
        "bc_class_pending": [...],
        "changes_summary": [...],
        "diff": "..."
      }

      将 vNext YAML 写入 candidate 文件（不覆盖原文件）：
      flow/workflows/library/{workflow_id}_candidate.yaml

      如果没有任何 A 类改进，仍然输出 improvement_package.json 记录评估结果，
      但不生成 candidate 文件。
    output:
      artifacts:
        - key: improvement_package
          path: improvement_package.json
          type: json
        - key: candidate_workflow
          path: "output/{workflow_id}_candidate.yaml"
          type: file
    timeout_seconds: 600

  # 步骤 7：异步通知（非阻塞，自动完成）
  - id: notify_completion
    name: "通知用户并记录 pending 改进"
    agent: evaluator_01
    depends: [apply_improvement]
    input:
      from_artifacts: [improvement_package, evaluation_report]
    prompt: |
      工作流创建完毕，通过 HChat 向 akane 发送完成通知（非阻塞，不等待回复）。

      通知内容应包含：
      1. 新工作流的基本信息（ID、步骤数、预计耗时/成本）
      2. 设计质量评分
      3. 已自动应用的 A 类改进（如有）
      4. 待批准的 B/C 类改进数量（如有，提示用户查看 pending.yaml）
      5. candidate 文件位置（如有）

      输出 notification_report.json：
      {
        "notified": true,
        "notification_text": "...",
        "pending_improvements_count": 0
      }

      注意：这是纯通知步骤，不等待回复，不阻塞工作流。
    output:
      artifacts:
        - key: notification_report
          path: notification_report.json
          type: json
    timeout_seconds: 600

# =============================================================================
# 错误处理
# =============================================================================

error_handling:
  debug_agent: debug_01
  max_attempts: 3
  retry_strategy:
    attempt_1: "检查错误日志，调整 prompt 重试"
    attempt_2: "切换到更强的 model (opus) 重试"
    attempt_3: "简化设计要求，减少步骤数量重试"
  on_max_exceeded:
    action: notify_human_interface
    target: akane
    message: "工作流设计失败（已尝试3次），步骤：{failed_step_id}，错误：{error}"

# =============================================================================
# 成功标准
# =============================================================================

success_criteria:
  - "步骤 validate_workflow 状态为 completed"
  - "validation_report.valid == true"
  - "validation_report.design_quality_score >= 6"
  - "review_report.overall_verdict != 'reject'"
  - "工作流 YAML 文件已创建"
  - "所有 worker AGENT.md 已创建"
  - "evaluation_report 已生成"
  - "improvement_package 已生成（至少记录了本次评估结果）"

# =============================================================================
# 输出
# =============================================================================

output:
  type: message
  notify_agent: akane  # 通知 Human Interface Agent
  message_template: |
    ✅ 工作流创建完成！

    📋 工作流 ID：{new_workflow.id}
    📁 文件位置：{new_workflow.yaml_path}
    🤖 Agent 数量：{new_workflow.agent_count}
    📊 步骤数量：{new_workflow.step_count}
    📈 设计质量评分：{evaluation_report.metrics.design_quality_score}/10
    💰 预计成本：${evaluation_report.metrics.estimated_cost_usd}

    🔄 Candidate：{improvement_package.candidate_path or "无改进需要"}
    📝 待审改进：{improvement_package.bc_class_pending_count or 0} 条

# =============================================================================
# Evaluator 配置（持续改进闭环）
# =============================================================================

evaluation:
  enabled: true
  metrics:
    - total_duration
    - design_quality_score       # Validator 双层验证评分
    - model_cost_estimate        # 所有 worker 的 API 成本估算
    - error_retries              # 触发 debug_agent 的次数
    - improvement_adoption_rate  # 上次 Evaluator 建议有多少被 Designer 采纳
  improvement_threshold: 2       # 每2次运行就触发改进尝试
  auto_apply: true               # A 类改进自动应用到 candidate

# =============================================================================
# Candidate 发布机制（由 flow_runner 在下次启动时自动处理）
# =============================================================================
#
# flow_runner 启动时检查：
# 1. 是否存在 {workflow_id}_candidate.yaml？
# 2. 如果存在，加载 candidate 而非原文件
# 3. 如果 candidate run 成功 → 自动晋升为正式版本
# 4. 如果 candidate run 失败 → 删除 candidate，回退到上一版
# 5. 晋升/回退均记录到 evaluation_kb/workflow_versions/

# =============================================================================
# 实时通知与控制机制 (v1.4.0)
# =============================================================================
#
# 【事件驱动通知】
# flow_runner 在每个步骤的开始/完成/失败/跳过时，自动通过 HChat 通知
# human_interface agent（即 akane）。不再依赖轮询式 watchdog。
# 步骤可通过 notify: false 关闭通知（减少噪音）。
#
# 【暂停控制】
# 外部可随时创建 flow/runs/{run_id}/_pause 文件来暂停工作流。
# 当前步骤会执行完毕，下一步开始前进入等待。
# 删除 _pause 文件即可恢复。文件内容作为暂停原因记录。
#
# 【紧急停止】
# 创建 flow/runs/{run_id}/_stop 文件立即终止工作流。
# 当前步骤执行完毕后不再继续。文件内容作为停止原因记录。
# 启动时 HChat 通知中会包含信号文件的完整路径。
#
# 使用方式（human 通过 akane 操作）：
#   暂停: touch flow/runs/{run_id}/_pause
#   恢复: rm flow/runs/{run_id}/_pause
#   停止: echo "原因" > flow/runs/{run_id}/_stop
