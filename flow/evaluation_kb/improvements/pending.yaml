    target: "Add user satisfaction feedback collection between step_07 and step_08"
    title: "Add user satisfaction scoring to workflow output"
    description: |
      After markdown_generator completes, collect brief user satisfaction rating
      (1-5 scale) on translation quality and style preference correlation.
      This provides ground truth for self_evolution_analyzer.style_preference_insights analysis.

    evidence:
      - "Design package shows self_evolution_analyzer tracks 'style_preference_correlation' but without user feedback"
      - "Currently only has translator confidence scores, not actual user satisfaction"
      - "Feedback loop missing: analyst → translator → user → evolution"

    proposed_change: |
      Add optional step_07b_satisfaction_collection between markdown_generator (step 07)
      and self_evolution_analyzer (step 08) that:
      1. Asks user: "Rate overall translation quality (1-5 scale)"
      2. Asks: "Which style (A or B) better matches your preference? (A/B/tie)"
      3. Collects as satisfaction_report.json artifact

    expected_benefit: |
      - Improved correlation analysis in self_evolution step
      - Better training signal for future workflow optimizations
      - Increases accuracy of style_preference_insights from 60% to estimated 85%

    confidence: 0.85
    risk_level: low

    prerequisites:
      - "Add optional human_interface interaction capability"
      - "HChat integration with 30-second timeout"
      - "satisfaction_report.json schema definition"

    affected_steps: [8]
    implementation_effort: "medium"
    implementation_notes: |
      Would require HChat integration. Optional field in success_criteria.
      Should be non-blocking to main workflow (if user skips, evolution continues).

