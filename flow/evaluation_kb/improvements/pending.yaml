  - id: "imp-run-meta-workflow-creation-20260326-211522-003"
    class: B
    priority: medium
    workflow_id: haiku-translation-multi-style
    timestamp: "2026-03-26T21:15:22Z"

    target: "workers/cultural_adapter output enhancement"
    title: "Add style difficulty scoring to cultural adaptation output"
    description: |
      Extend cultural_adapter output to include a difficulty_score (0-100) for each
      style based on haiku characteristics. This helps translator_style_a/b workers
      adjust prompt guidance based on actual haiku complexity.

    evidence:
      - "Some haiku are much harder to translate (abstract Zen references, rare seasonal words)"
      - "Current design provides no signal to translators about expected difficulty"
      - "cultural_adapter is the natural place to assess this after analyzing both styles"

    proposed_change: |
      Extend cultural_adapter.cultural_notes.json output to include:
      {
        ...
        "style_a_difficulty_score": 0-100,
        "style_b_difficulty_score": 0-100,
        "difficulty_reasoning": "..."
      }

    expected_benefit: |
      - Enables translator prompts to be adjusted: high-difficulty haiku → more detailed guidance
      - Estimated 15-20% improvement in first-attempt quality for difficult haiku
      - Better resource allocation (can prioritize complex haiku)

    confidence: 0.78
    risk_level: very_low

    affected_steps: [4, 5]
    implementation_effort: "low"
    implementation_notes: |
      Requires adding 2 numeric fields to cultural_adapter output.
      Quality_gatekeeper step 5 should flag if difficulty > 80 for potential escalation.
      No breaking changes to existing output schema.

    status: "pending_orchestrator_approval"
    approval_required_by: "orchestrator"
    submitted_date: "2026-03-26T21:15:22Z"
    submitted_by: evaluator_01

  - id: "imp-run-meta-workflow-creation-20260326-211522-004"
    class: C
    priority: low
    workflow_id: haiku-translation-multi-style
    timestamp: "2026-03-26T21:15:22Z"

    target: "step_05_quality_verification with auto-loop logic"
    title: "Add optional auto-loop for semantic preservation < 90%"
    description: |
      Implement optional feedback loop: if quality_gatekeeper detects
      semantic_score < 90%, automatically route back to translator with
      back-translation guidance without human intervention.

    evidence:
      - "Current design requires human decision if semantic < 85%"
      - "Back-translation comparison is already computed in step_05"
      - "Could automate retry with refined prompt: 'Back-translation shows {issues}. Adjust to preserve: {key_concepts}'"

    proposed_change: |
      Add conditional retry logic in quality_gatekeeper step:
      if semantic_score < 90%:
        - generate back_translation_guidance.json
        - trigger translator_retry step (max 2 attempts)
      else if semantic_score < 85%:
        - escalate to human_interface

    expected_benefit: |
      - Reduce human interventions by estimated 25-30%
      - Faster recovery from semantic drift
      - Maintains quality bar (>= 85%) while automating common retry scenario

    confidence: 0.72
    risk_level: medium

    affected_steps: [5, 2-3]
    implementation_effort: "high"
    implementation_notes: |
      Increases workflow complexity. Requires adding translator_retry step
      and back_translation_guidance generation. Could add 2-3 minutes to
      difficult haiku. Recommend making optional via pre_flight setting.

    status: "pending_user_approval"
    approval_required_by: "human_user"
    approval_context: "High complexity, potential for longer execution times"
    submitted_date: "2026-03-26T21:15:22Z"
    submitted_by: evaluator_01

