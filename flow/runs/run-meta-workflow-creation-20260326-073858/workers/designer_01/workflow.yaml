# HASHI Flow — 英文新闻翻译工作流
# Version: 1.0.0
# 任务: 将英文新闻文章翻译为中文，保存为 Markdown 文件

workflow:
  id: news-article-translation-v1
  name: "英文新闻文章翻译"
  version: "1.0.0"
  description: "将英文新闻文章翻译为中文（简体），保存为 Markdown 格式。完全自动化流程，无需人工干预。"
  tags: [translation, news, markdown, automated]

meta:
  created_by: workflow_design_agent
  created_at: "2026-03-26T07:45:00Z"
  last_improved_at: null
  improvement_count: 0
  source_prompt: "将一篇英文新闻文章翻译为中文，保存为 Markdown 文件"

# =============================================================================
# Pre-flight Configuration
# =============================================================================
pre_flight:
  analyst_agent: analyst_01
  auto_scan: true

  # 由于 max_interventions = 0，不收集用户输入
  # 所有参数通过环境变量或命令行传入
  # 默认值配置如下：
  collect_from_human: []

# =============================================================================
# Agent Definitions
# =============================================================================
agents:
  orchestrator:
    id: hchat_orchestrator

  workers:
    - id: analyst_01
      role: "内容分析员"
      agent_md: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/analyst_01/AGENT.md"
      workspace: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/analyst_01"
      backend: claude-cli
      model: claude-haiku-4-5
      controllable_by:
        - orchestrator
        - human

    - id: translator_01
      role: "中文翻译员"
      agent_md: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/translator_01/AGENT.md"
      workspace: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/translator_01"
      backend: claude-cli
      model: claude-sonnet-4-6
      controllable_by:
        - orchestrator
        - human

    - id: quality_reviewer_01
      role: "质量审核员"
      agent_md: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/quality_reviewer_01/AGENT.md"
      workspace: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/quality_reviewer_01"
      backend: claude-cli
      model: claude-opus-4-6
      controllable_by:
        - orchestrator
        - human

    - id: format_specialist_01
      role: "格式专家"
      agent_md: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/format_specialist_01/AGENT.md"
      workspace: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/format_specialist_01"
      backend: claude-cli
      model: claude-haiku-4-5
      controllable_by:
        - orchestrator
        - human

    - id: debug_01
      role: "调试与恢复专家"
      agent_md: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/debug_01/AGENT.md"
      workspace: "flow/runs/run-meta-workflow-creation-20260326-073858/workers/debug_01"
      backend: claude-cli
      model: claude-sonnet-4-6
      controllable_by:
        - orchestrator

# =============================================================================
# Workflow Steps (DAG)
# =============================================================================
steps:
  - id: step_01_validate_input
    name: "输入验证"
    agent: analyst_01
    depends: []

    input:
      files: []
      from_artifacts: []
      params:
        source_file: "${SOURCE_FILE_PATH}"

    prompt: |
      验证输入英文新闻文章的有效性。

      任务：
      1. 确认 {source_file} 文件存在且可读
      2. 检查文件编码（UTF-8 或其他）
      3. 验证文件大小合理（< 50MB）
      4. 快速扫描文件格式（纯文本、HTML、PDF 等）
      5. 验证文件包含有效的英文内容

      输出要求：
      - validation_status: PASS 或 FAIL
      - file_encoding: 检测到的编码
      - file_size_bytes: 文件大小
      - file_format: 检测到的格式
      - content_preview: 前200字符
      - issues: 任何检测到的问题列表

      如果有任何问题，请详细说明以便调试。

    output:
      artifacts:
        - key: validation_report
          path: artifacts/validation/validation_report.json
          type: json

    timeout_seconds: 60
    quality_gate:
      type: auto
      criteria:
        - "validation_status 为 PASS"
        - "file_encoding 被成功检测"
        - "content_preview 非空"

  - id: step_02_analyze_content
    name: "内容分析"
    agent: analyst_01
    depends: [step_01_validate_input]

    input:
      files: []
      from_artifacts: [validation_report]
      params:
        source_file: "${SOURCE_FILE_PATH}"

    prompt: |
      分析英文新闻文章的内容和结构。

      任务：
      1. 提取文章元数据：
         - 标题（如果有）
         - 作者名字（如果有）
         - 发布日期（如果有）
         - 来源 URL（如果有）

      2. 分析文章结构：
         - 段落数量
         - 标题层级结构
         - 列表项（如果有）
         - 特殊格式（引用、代码块等）

      3. 提取关键术语和名词：
         - 专有名词（人名、地名、组织名）
         - 技术术语或专业术语
         - 品牌名和产品名

      4. 评估内容复杂度：
         - 文章长度等级（短/中/长）
         - 语言难度（简单/中等/复杂）
         - 领域专业度（通俗/中等/高度专业）

      输出要求（JSON 格式）：
      - metadata: { title, author, date, source_url }
      - structure: { paragraph_count, has_headings, has_lists, special_elements }
      - key_terms: { proper_nouns: [], technical_terms: [], brands: [] }
      - complexity: { length_level, language_level, domain_expertise }
      - terminology_index: 需要特殊注意的术语列表

    output:
      artifacts:
        - key: content_analysis
          path: artifacts/analysis/content_analysis.json
          type: json
        - key: terminology_index
          path: artifacts/analysis/terminology_index.json
          type: json

    timeout_seconds: 120
    quality_gate:
      type: auto
      criteria:
        - "metadata 字段存在"
        - "key_terms 包含至少一个术语"
        - "terminology_index 非空"

  - id: step_03_domain_assessment
    name: "领域评估与翻译指南"
    agent: analyst_01
    depends: [step_02_analyze_content]

    input:
      from_artifacts: [content_analysis, terminology_index]

    prompt: |
      根据内容分析结果，评估文章所属领域并制定翻译指南。

      任务：
      1. 识别文章主要领域（从以下类别选择）：
         - 科技/IT
         - 商业/财经
         - 政治/政府
         - 科学/研究
         - 体育
         - 娱乐
         - 健康/医疗
         - 其他（请指定）

      2. 根据领域特点制定翻译指南：
         - 建议的翻译风格（正式/通俗/中立）
         - 术语处理建议
         - 人名/地名保留还是音译原则
         - 避免的常见翻译错误

      3. 制定术语翻译清单：
         - 为 {terminology_index} 中的关键术语建议中文翻译
         - 标注专有名词的处理方式

      4. 提供特殊考虑事项：
         - 文化背景理解需求
         - 需要保留的原文表达
         - 可能的岐义处理

      输出要求（JSON 格式）：
      - domain: 识别的领域
      - translation_style: 建议的翻译风格
      - translation_principles: 翻译原则列表
      - terminology_translations: { 原文术语: 建议译文 }
      - special_considerations: 特殊考虑事项列表
      - quality_checkpoints: 质量检查要点

    output:
      artifacts:
        - key: domain_assessment
          path: artifacts/analysis/domain_assessment.json
          type: json
        - key: translation_guidelines
          path: artifacts/analysis/translation_guidelines.json
          type: json

    timeout_seconds: 120
    quality_gate:
      type: auto
      criteria:
        - "domain 字段已填写"
        - "translation_style 字段已填写"
        - "terminology_translations 非空"

  - id: step_04_initial_translation
    name: "初始翻译"
    agent: translator_01
    depends: [step_01_validate_input, step_03_domain_assessment]

    input:
      files: []
      from_artifacts: [domain_assessment, translation_guidelines]
      params:
        source_file: "${SOURCE_FILE_PATH}"

    prompt: |
      根据翻译指南将英文新闻文章翻译为中文。

      翻译要求：
      1. 翻译风格：{domain_assessment.translation_style}
      2. 遵循翻译原则：
         {translation_guidelines.translation_principles}
      3. 使用提供的术语翻译：
         {translation_guidelines.terminology_translations}
      4. 特殊考虑：
         {translation_guidelines.special_considerations}

      翻译标准：
      - 完整性：100% 翻译原文内容，不遗漏
      - 准确性：保留原文意思，避免误译
      - 流畅性：中文表达自然、流畅、地道
      - 一致性：同一术语始终使用同一译文
      - 结构保留：保持原文的段落、标题结构

      特殊处理：
      - 保留链接和网址（如有）
      - 保留原文中的数字、日期、统计数据
      - 标注任何无法确定的翻译（使用 [?...?] 格式）
      - 保留原文中的强调标记（粗体、斜体等的含义）

      输出格式：
      直接输出翻译后的完整文章文本，保持原文结构。
      如果遇到无法翻译的内容，请使用 [?原文?] 标注并继续。

    output:
      artifacts:
        - key: draft_translation_zh
          path: artifacts/translation/draft_translation_zh.txt
          type: file

    timeout_seconds: 300
    quality_gate:
      type: auto
      criteria:
        - "draft_translation_zh 文件存在"
        - "文件大小 > 100 字节"

  - id: step_05_quality_review
    name: "质量审核与修正"
    agent: quality_reviewer_01
    depends: [step_04_initial_translation, step_01_validate_input]

    input:
      from_artifacts: [draft_translation_zh, validation_report]
      params:
        source_file: "${SOURCE_FILE_PATH}"

    prompt: |
      对初始翻译进行全面的质量审核和修正。

      审核维度：
      1. 准确性检查：
         - 对比原文和译文，确保没有遗漏或误译
         - 检查数字、日期、统计数据是否正确
         - 验证人名、地名、组织名的准确性

      2. 术语一致性：
         - 检查同一术语是否始终使用同一译文
         - 验证使用的术语与指南一致
         - 识别任何非标准的术语使用

      3. 流畅性和自然度：
         - 中文表达是否自然、地道
         - 是否存在生硬的逐词翻译
         - 句式结构是否符合中文习惯
         - 句子长度和节奏是否合适

      4. 语法和拼写：
         - 中文语法是否正确
         - 是否有打字错误或拼写错误
         - 标点符号使用是否正确

      5. 内容完整性：
         - 是否所有段落都已翻译
         - 标题、副标题是否完整
         - 是否有遗漏的内容

      修正工作：
      - 对所有发现的问题进行修正
      - 确保修正后的文本仍保持原意
      - 改进文本流畅性
      - 统一术语使用

      输出要求：
      1. review_notes.json：
         - issues_found: 发现的所有问题列表
         - corrections_made: 进行的所有修正列表
         - quality_score: 0-100 的质量评分
         - recommendations: 进一步改进建议

      2. corrected_translation_zh.txt：
         - 修正后的完整翻译文本

    output:
      artifacts:
        - key: review_notes
          path: artifacts/quality/review_notes.json
          type: json
        - key: corrected_translation_zh
          path: artifacts/quality/corrected_translation_zh.txt
          type: file

    timeout_seconds: 300
    quality_gate:
      type: auto
      criteria:
        - "corrected_translation_zh 文件存在且大小合理"
        - "review_notes 中的 quality_score >= 85"

  - id: step_06_markdown_formatting
    name: "Markdown 格式化"
    agent: format_specialist_01
    depends: [step_05_quality_review, step_02_analyze_content]

    input:
      from_artifacts: [corrected_translation_zh, content_analysis]

    prompt: |
      将修正后的翻译文本格式化为标准 Markdown 文件。

      格式化要求：
      1. 添加 YAML Front Matter（可选）：
         - title: 文章标题
         - author: 作者（如有）
         - date: 发布日期（如有）
         - source_url: 来源 URL（如有）
         - translated_at: 翻译完成时间

      2. 标题格式：
         - 主标题使用 #
         - 副标题使用 ##
         - 其他标题按原文层级使用 ###、####

      3. 段落格式：
         - 段落间使用空行分隔
         - 长段落保持原段落分隔
         - 避免不必要的换行

      4. 列表格式：
         - 无序列表使用 -
         - 有序列表使用 1.、2. 等
         - 嵌套列表缩进 2 个空格

      5. 强调和特殊格式：
         - 加粗使用 **文本**
         - 斜体使用 *文本*
         - 代码使用 `代码`
         - 代码块使用 ```

      6. 链接处理：
         - URL 转换为 Markdown 链接格式 [文本](URL)
         - 保留所有链接的原始 URL

      7. 编码和特殊字符：
         - 确保 UTF-8 编码
         - 正确处理所有中文字符
         - 保留原文中的特殊符号

      8. 文件结构：
         - 清晰的段落分隔
         - 合理的标题层级
         - 完整的内容

      输出要求：
      - formatted_markdown.md：格式化后的完整 Markdown 文件
      - formatting_report.json：
        - sections_count: 部分数量
        - lists_count: 列表数量
        - links_count: 链接数量
        - encoding: 文件编码
        - validation_status: 验证状态

    output:
      artifacts:
        - key: formatted_markdown_draft
          path: artifacts/formatting/formatted_markdown_draft.md
          type: file
        - key: formatting_report
          path: artifacts/formatting/formatting_report.json
          type: json

    timeout_seconds: 120
    quality_gate:
      type: auto
      criteria:
        - "formatted_markdown_draft 文件存在"
        - "文件包含有效的 Markdown 语法"
        - "encoding 为 UTF-8"

  - id: step_07_final_review
    name: "最终审查与打磨"
    agent: quality_reviewer_01
    depends: [step_06_markdown_formatting]

    input:
      from_artifacts: [formatted_markdown_draft]

    prompt: |
      对格式化后的 Markdown 文件进行最终审查和打磨。

      审查清单：
      1. Markdown 语法验证：
         - 所有标题格式正确
         - 列表格式正确
         - 链接格式正确
         - 代码块格式正确
         - 没有未闭合的格式标记

      2. 内容完整性检查：
         - 所有内容都已包含
         - 没有遗漏的段落
         - 没有重复的内容

      3. 可读性检查：
         - 段落长度合适
         - 标题清晰明确
         - 整体结构逻辑清晰
         - 空行使用合理

      4. 文本质量检查：
         - 没有拼写错误
         - 没有语法错误
         - 中文表达自然流畅
         - 术语使用一致

      5. 格式一致性：
         - 标题格式一致
         - 列表标记一致
         - 缩进一致
         - 空行使用一致

      6. 最终打磨：
         - 优化任何不自然的表达
         - 改进文本流畅性
         - 确保整体质量达到出版级别

      输出要求：
      1. final_review_checklist.json：
         - all_checks_passed: true/false
         - issues_found: 任何发现的问题
         - fixes_applied: 进行的所有修复
         - final_quality_score: 最终质量评分（0-100）
         - sign_off: "ready_for_output" 或详细说明

      2. final_translation_md：
         - 最终版本的 Markdown 文件内容
         - 所有修复已应用

    output:
      artifacts:
        - key: final_review_checklist
          path: artifacts/final/final_review_checklist.json
          type: json
        - key: final_translation_md
          path: artifacts/final/final_translation.md
          type: file

    timeout_seconds: 120
    quality_gate:
      type: auto
      criteria:
        - "final_review_checklist.all_checks_passed = true"
        - "final_review_checklist.final_quality_score >= 90"
        - "final_translation_md 文件存在"

  - id: step_08_output_generation
    name: "输出文件生成与验证"
    agent: format_specialist_01
    depends: [step_07_final_review]

    input:
      from_artifacts: [final_translation_md]

    prompt: |
      生成最终的输出 Markdown 文件并进行验证。

      任务：
      1. 从 final_translation_md 生成最终输出文件：
         - 文件名：output.md
         - 路径：artifacts/output/output.md
         - 编码：UTF-8
         - 确保文件完整性

      2. 文件验证：
         - 检查文件是否可读
         - 验证文件编码为 UTF-8
         - 检查文件大小合理（>= 源文件大小的 70%）
         - 验证 Markdown 语法有效性
         - 验证所有文本都已正确包含

      3. 生成验证报告：
         - file_size_bytes: 文件大小
         - encoding: 文件编码
         - line_count: 行数
         - word_count: 字数统计
         - markdown_valid: Markdown 是否有效
         - all_validations_passed: 所有验证是否通过
         - checksum: MD5 校验和（用于完整性验证）

      4. 最后检查：
         - 确保没有编码问题
         - 确保没有截断
         - 确保所有特殊字符正确显示

      输出要求：
      1. output.md - 最终的 Markdown 文件
      2. validation_report.json - 详细的验证报告
      3. completion_summary.json - 工作流完成总结

    output:
      artifacts:
        - key: output_file
          path: artifacts/output/output.md
          type: file
        - key: validation_report_final
          path: artifacts/output/validation_report.json
          type: json
        - key: completion_summary
          path: artifacts/output/completion_summary.json
          type: json

    timeout_seconds: 60
    quality_gate:
      type: auto
      criteria:
        - "output_file 存在且大小合理"
        - "validation_report_final.markdown_valid = true"
        - "validation_report_final.all_validations_passed = true"

# =============================================================================
# Error Handling
# =============================================================================
error_handling:
  debug_agent: debug_01
  max_attempts: 3

  retry_strategy:
    attempt_1: "分析错误信息，调整 prompt 或输入参数后重试"
    attempt_2: "切换到更高容量的 model（如从 haiku 切换到 sonnet）"
    attempt_3: "将步骤拆分为更小的子任务或跳过该步骤"

  on_max_exceeded:
    action: notify_orchestrator
    message: "步骤 {step_id} 在 3 次尝试后仍失败。错误：{error_message}。建议：{suggested_fix}"

# =============================================================================
# Success Criteria
# =============================================================================
success_criteria:
  - "步骤 step_08_output_generation 状态为 completed"
  - "artifacts/output/output.md 文件存在且大小合理"
  - "output_file 通过所有验证检查"
  - "完成时间在预期范围内（20-35 分钟）"
  - "没有人工干预（max_interventions = 0）"

# =============================================================================
# Output Definition
# =============================================================================
output:
  type: file
  source_artifact: output_file
  destination: "artifacts/output/output.md"
  notify_orchestrator: true

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: true
  metrics:
    - human_interventions
    - total_duration
    - error_retries
    - quality_score
  improvement_threshold: 3

  # 特定的评估配置
  target_metrics:
    max_human_interventions: 0
    max_total_duration_minutes: 35
    max_error_retries: 0
    min_quality_score: 90

# =============================================================================
# Workflow Timeline Estimate
# =============================================================================
timeline:
  step_01_validate_input: 1
  step_02_analyze_content: 3
  step_03_domain_assessment: 2
  step_04_initial_translation: 5
  step_05_quality_review: 4
  step_06_markdown_formatting: 2
  step_07_final_review: 2
  step_08_output_generation: 1

  total_estimated_minutes: 20
  buffer_percent: 25
  estimated_total_with_buffer_minutes: 25
