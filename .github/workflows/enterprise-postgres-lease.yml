name: enterprise-postgres-lease

on:
  push:
    paths:
      - "orchestrator/enterprise/leases.py"
      - "orchestrator/enterprise/lease_rehearsal.py"
      - "tests/test_enterprise_postgres_integration.py"
      - "docs/HASHI_ENTERPRISE_POSTGRES_LEASE_REHEARSAL.md"
      - ".github/workflows/enterprise-postgres-lease.yml"
  pull_request:
    paths:
      - "orchestrator/enterprise/leases.py"
      - "orchestrator/enterprise/lease_rehearsal.py"
      - "tests/test_enterprise_postgres_integration.py"
      - "docs/HASHI_ENTERPRISE_POSTGRES_LEASE_REHEARSAL.md"
      - ".github/workflows/enterprise-postgres-lease.yml"

jobs:
  postgres-lease-rehearsal:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hashi
          POSTGRES_PASSWORD: hashi
          POSTGRES_DB: hashi_enterprise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hashi -d hashi_enterprise"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      HASHI_ENTERPRISE_POSTGRES_TEST_URL: postgresql://hashi:hashi@localhost:5432/hashi_enterprise
      HASHI_ENTERPRISE_POSTGRES_TEST_ORG_ID: ORG-CI
      HASHI_ENTERPRISE_POSTGRES_TEST_LEASE: ci-postgres-lease-rehearsal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "psycopg[binary]"

      - name: Run PostgreSQL lease rehearsal
        run: pytest -q tests/test_enterprise_postgres_integration.py
