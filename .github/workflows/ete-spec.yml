name: ete-spec

on:
  push:
    paths:
      - "specs/ete/**"
      - "tests/ete/**"
      - ".github/workflows/ete-spec.yml"
  pull_request:
    paths:
      - "specs/ete/**"
      - "tests/ete/**"
      - ".github/workflows/ete-spec.yml"

jobs:
  ete-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydantic pytest

      - name: Run ETE spec tests
        run: pytest tests/ete/ -v
