# Hashi Remote Configuration
# ═══════════════════════════════════════════════════════
# Component of HASHI — Hashi Remote v1.0.0
# Spiritual successor to Lily Remote by Barry & XiaoLei 🌸
# ═══════════════════════════════════════════════════════

server:
  host: "0.0.0.0"
  port: 8767                # Hashi Remote peer port (8767 — 8766 reserved for HASHI1 legacy remote)
  use_tls: false

lifecycle:
  # Remote starts by default unless explicitly disabled with /remote off.
  remote_enabled: true
  # HASHI9 runs its own Hashi Remote under the external supervisor/service.
  # The separate WatchTower project has its own repo, service, instance id,
  # and port; do not treat this HASHI repo as the WatchTower runtime.
  remote_supervised: true

security:
  # LAN mode: keeps pairing-auth endpoints permissive for trusted local use.
  # Protocol trust still requires a shared token; leave this false by default.
  lan_mode: false

  # Maximum auth level allowed for terminal commands
  # L0=read-only, L1=read-files, L2=write, L3=restart (never L4=system)
  max_terminal_level: "L3_RESTART"

terminal:
  enabled: true
  timeout_seconds: 30

discovery:
  # Backend: "lan", "tailscale", or "both"
  backend: "lan"
  # mDNS service type — do not change unless you know what you're doing
  service_type: "_hashi._tcp.local."

logging:
  level: INFO
  audit_file: "~/.hashi-remote/audit.jsonl"
